name: Typecheck

on: [push]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install libEGL.so
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install the project
        run: uv sync
      - name: Typecheck
        run: uv run pyright
